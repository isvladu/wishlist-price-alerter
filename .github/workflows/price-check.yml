name: Wishlist Price Check

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hours
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore price database
        uses: actions/cache@v4
        with:
          path: data/prices.db
          # New cache entry per run; restore-keys picks up the most recent existing one
          key: prices-db-${{ github.run_id }}
          restore-keys: prices-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Create config.json
        run: cp config.example.json config.json

      - name: Run price check
        env:
          STEAM_ID_64: ${{ secrets.STEAM_ID_64 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GGDEALS_API_KEY: ${{ secrets.GGDEALS_API_KEY }}
        run: python main.py

      - name: Database summary
        if: always()
        run: |
          python -c "
          from pathlib import Path
          db = Path('data/prices.db')
          if not db.exists():
              print('No database found.')
          else:
              import sqlite3
              conn = sqlite3.connect(db)
              print('Games:    ', conn.execute('SELECT COUNT(*) FROM games').fetchone()[0])
              print('Snapshots:', conn.execute('SELECT COUNT(*) FROM price_snapshots').fetchone()[0])
              print('Notifications:', conn.execute('SELECT COUNT(*) FROM notifications').fetchone()[0])
              print('Sources:  ', [r[0] for r in conn.execute('SELECT DISTINCT source FROM price_snapshots').fetchall()])
              conn.close()
          "

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prices-db
          path: data/prices.db
          retention-days: 7
